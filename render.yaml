# Render blueprint: web service + free Postgres database.
# Deploy via Render's "Blueprint" flow or just connect the repo and Render will
# auto-detect this file.
#
# Free-tier notes:
#   - The web service sleeps after 15 min idle and takes ~30 s to wake up.
#   - The free Postgres instance expires after 90 days (Render emails you).
#     Upgrade to a paid plan before that, or export and recreate.

services:
  - type: web
    name: bestgen
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: Postgres
      - key: SeedDatabase
        value: true
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: bestgen-db
          property: connectionString
      # Set ANTHROPIC_API_KEY via Render Dashboard → Environment.
      # Leave value blank in render.yaml so the secret stays out of git.
      - key: ANTHROPIC_API_KEY
        sync: false
      # SMTP for invoice email delivery (any provider — Sendgrid, Postmark,
      # AWS SES, Resend, Gmail SMTP). Set via Dashboard.
      - key: Smtp__Host
        sync: false
      - key: Smtp__Port
        value: "587"
      - key: Smtp__User
        sync: false
      - key: Smtp__Password
        sync: false
      - key: Smtp__FromEmail
        sync: false
      - key: Smtp__FromName
        value: "Bestgen"
      # WhatsApp Cloud API (Meta Business). Set via Dashboard.
      - key: WhatsApp__AccessToken
        sync: false
      - key: WhatsApp__PhoneNumberId
        sync: false
      - key: WhatsApp__DefaultTemplateName
        sync: false
      - key: WhatsApp__DefaultTemplateLanguage
        value: "en_US"
      # ZATCA FATOORA submission. Get BinarySecurityToken + Secret from ZATCA's onboarding flow.
      - key: Fatoora__Mode
        value: "Sandbox"
      - key: Fatoora__BinarySecurityToken
        sync: false
      - key: Fatoora__Secret
        sync: false
      # Sentry DSN for error monitoring (Sentry → Settings → Client Keys).
      - key: Sentry__Dsn
        sync: false
      - key: Sentry__TracesSampleRate
        value: "0.1"

databases:
  - name: bestgen-db
    plan: free
    databaseName: bestgen
    user: bestgen
    region: oregon
