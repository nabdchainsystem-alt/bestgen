<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Bestgen</title>
    <link rel="icon" type="image/png" href="/img/logo.png" />
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #ffffff;
            --text: #1B2E4B;
            --muted: #4A6E91;
            --border: #E5EAF2;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 6px 24px rgba(27, 46, 75, .08);
        }
        .icon {
            width: 72px; height: 72px;
            border-radius: 18px;
            background: #EEF2FA;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 36px;
            color: var(--text);
        }
        h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
        p  { margin: 0 0 24px; color: var(--muted); line-height: 1.5; }
        button {
            background: var(--text);
            color: #fff;
            border: 0;
            border-radius: 10px;
            padding: 12px 20px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: .92; }
        .lang { margin-top: 20px; color: var(--muted); font-size: 13px; direction: rtl; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>Bestgen needs an internet connection to reach the server.<br/>
           Cached pages you've already opened may still work.</p>
        <button onclick="location.reload()">Retry</button>
        <p class="lang">أنت غير متصل بالإنترنت. الصفحات المخزنة مسبقاً قد تظل تعمل.</p>
    </div>
</body>
</html>
